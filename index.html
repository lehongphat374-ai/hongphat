<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y7.com</title>
    <link rel="stylesheet" href="trangchu.css">
</head>
<body>

    <header>
        <div class="logo"> Y7.com</div>
        <nav>
            <ul>
                <li><a href="#" onclick="showHome()">Trang Chủ</a></li>
                <!-- <li><a href="#">Hành Động</a></li>
                <li><a href="#">Đua Xe</a></li> -->
            </ul>
        </nav>
        <input type="text" id="searchBar" placeholder="Tìm game...">
    </header>

    <main id="game-container">

    <div class="game-grid" id="gameGrid">

        <div class="game-card" data-name="flappy bird" data-url="game2.html">
            <img src="ImageGames/flappybird.png">
            <p>flappybird</p>
        </div>

        <div class="game-card" data-name="ban chim" data-url="game1.html">
            <img src="ImageGames/chim.png">
            <p>ban chim</p>
        </div>

        <div class="game-card" data-name="ban thuyen" data-url="banruoi.html">
            <img src="ImageGames/maybay.png">
            <p>ban ruoi</p>
        </div>

    </div>

    <p id="noResult" class="hidden" style="color:white;text-align:center;">
        Không tìm thấy game 😢
    </p>

    <div id="player-screen" class="hidden">
        <button onclick="showHome()" class="back-btn">⬅ Quay lại</button>
        <br>
        <h2 id="gameTitle" style="color:rgb(187, 28, 28);"></h2>
        <iframe src="" id="gameFrame"></iframe>
        
    </div>

</main>

    <script src="trangchu.js"></script>
</body>
</html>
